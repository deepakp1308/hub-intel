name: HUB-INTEL Weekly Brief

on:
  schedule:
    # Every Monday at midnight ET (05:00 UTC)
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Report date (e.g., April 4, 2026)'
        required: false

permissions:
  contents: write
  pages: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
        run: |
          python -m hub_intel.agent \
            --date "${{ github.event.inputs.report_date || '' }}" \
            --skip-publish \
            -v

      - name: Commit and push report
        run: |
          git config user.name "hub-intel-bot"
          git config user.email "hub-intel-bot@users.noreply.github.com"
          git add reports/ docs/
          git diff --cached --quiet || git commit -m "HUB-INTEL report: $(date +%Y-%m-%d)"
          git push

  deploy-pages:
    needs: generate-brief
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
